<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日語工具</title>
<script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080a;--s1:#111114;--s2:#18181c;--s3:#222228;
  --border:#2a2a32;--text:#d4d4dd;--dim:#555566;--mid:#8888a0;
  --accent:#e87461;--blue:#5ea8d4;--gold:#d4a24e;--green:#5ebf7b;
  --pink:#d46a8f;--cyan:#4ecfd4;--purple:#9a7ae0;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP','PingFang SC',system-ui,sans-serif}
a{color:inherit;text-decoration:none}

/* Layout */
#app{display:flex;flex-direction:column;height:100dvh;max-width:680px;margin:0 auto}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
header .sub{font-size:11px;color:var(--dim);margin-left:8px}
#settings-btn{background:none;border:1px solid var(--border);color:var(--mid);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer}
#settings-btn:hover{border-color:var(--mid);color:var(--text)}

/* Tabs */
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s1)}
.tab{flex:1;padding:11px 4px;font-size:13px;font-weight:500;color:var(--mid);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}

/* Panels */
main{flex:1;overflow:hidden;position:relative}
.panel{display:none;flex-direction:column;height:100%;padding:16px}
.panel.active{display:flex}

/* Mode toggle (口播) */
.mode-row{display:flex;gap:6px;margin-bottom:12px;flex-shrink:0}
.mode-btn{padding:6px 16px;font-size:12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--mid);cursor:pointer;transition:all .15s}
.mode-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* Textarea */
.input-wrap{flex-shrink:0}
textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:12px 14px;resize:none;outline:none;font-family:inherit;line-height:1.6;transition:border-color .15s}
textarea:focus{border-color:var(--mid)}
textarea::placeholder{color:var(--dim)}
#ta-translate{height:90px}
#ta-correct{height:110px}
#ta-script{height:80px}

/* Run button */
.run-btn{width:100%;margin-top:10px;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;flex-shrink:0}
.run-btn:hover{opacity:.85}
.run-btn:disabled{opacity:.4;cursor:not-allowed}

/* Output area */
.output{flex:1;overflow-y:auto;margin-top:14px;min-height:0}
.output:empty{display:none}

/* Result cards */
.result-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.result-card:last-child{margin-bottom:0}
.card-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.card-main{font-size:17px;color:#fff;line-height:1.7;font-weight:500}
.card-main.ja{font-size:18px}

/* Component tags */
.comp-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.comp-tag{font-size:12px;padding:3px 10px;background:rgba(78,207,212,.1);border:1px solid rgba(78,207,212,.25);border-radius:12px;color:var(--cyan)}
.comp-reason{font-size:12px;color:var(--mid)}

/* Error annotations */
.error-item{margin-bottom:10px;padding:10px 12px;background:var(--s2);border-radius:8px;border-left:3px solid var(--accent)}
.error-span{color:var(--accent);font-weight:600}
.error-type{font-size:11px;padding:2px 8px;background:rgba(232,116,97,.15);border-radius:10px;color:var(--accent);margin-left:6px}
.error-note{font-size:13px;color:var(--mid);margin-top:4px}
.no-error{color:var(--green);font-size:14px}

/* Script sections */
.script-block{margin-bottom:12px}
.script-label{font-size:11px;letter-spacing:2px;color:var(--purple);margin-bottom:6px;text-transform:uppercase}
.script-text{font-size:15px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.hook-card{background:var(--s2);border-radius:8px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--gold)}
.hook-type{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.hook-example{font-size:14px;color:#fff;margin-bottom:3px}
.hook-why{font-size:12px;color:var(--mid)}
.phrase-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.phrase{font-size:13px;padding:4px 10px;background:var(--s3);border-radius:6px;color:var(--text)}

/* Loading */
.loading{display:flex;align-items:center;gap:8px;padding:16px;color:var(--mid);font-size:13px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mid);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Logic note */
.logic-note{font-size:13px;color:var(--mid);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.6}

/* Settings modal */
#settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
#settings-modal.open{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:400px}
.modal-box h2{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
.modal-box p{font-size:12px;color:var(--dim);margin-bottom:16px}
.modal-box input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px;outline:none;font-family:monospace}
.modal-box input:focus{border-color:var(--mid)}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-cancel{padding:10px 16px;background:none;border:1px solid var(--border);color:var(--mid);border-radius:8px;font-size:13px;cursor:pointer}

/* No key banner */
#no-key{display:none;background:rgba(232,116,97,.1);border:1px solid rgba(232,116,97,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--accent);margin-bottom:12px;cursor:pointer;flex-shrink:0}
#no-key.show{display:block}

/* TTS */
.tts-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;padding:5px 12px;background:none;border:1px solid var(--border);border-radius:20px;color:var(--mid);font-size:12px;cursor:pointer;transition:all .15s}
.tts-btn:hover{border-color:var(--green);color:var(--green)}
.tts-btn.playing{border-color:var(--green);color:var(--green);background:rgba(94,191,123,.08)}
.tts-btn:disabled{opacity:.4;cursor:not-allowed}
/* PDF */
.pdf-btn{display:inline-flex;align-items:center;gap:4px;margin-top:10px;margin-left:8px;padding:5px 12px;background:none;border:1px solid var(--border);border-radius:20px;color:var(--mid);font-size:12px;cursor:pointer;transition:all .15s}
.pdf-btn:hover{border-color:var(--gold);color:var(--gold)}
.pdf-btn:disabled{opacity:.4;cursor:not-allowed}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- Settings modal -->
<div id="settings-modal">
  <div class="modal-box">
    <h2>API Keys</h2>
    <p>Anthropic API Key，储存在本地浏览器，不会上传。</p>
    <input type="password" id="key-input" placeholder="sk-ant-...">
    <div id="key-test-result" style="font-size:12px;margin-top:8px;min-height:16px"></div>
    <div class="modal-actions">
      <button class="btn-save" id="key-save">保存</button>
      <button class="btn-cancel" id="key-test" style="padding:10px 16px;background:none;border:1px solid var(--border);color:var(--mid);border-radius:8px;font-size:13px;cursor:pointer">测试</button>
      <button class="btn-cancel" id="key-cancel">取消</button>
    </div>
  </div>
</div>

<div id="app">
  <!-- Header -->
  <header>
    <div>
      <span style="font-size:15px;font-weight:700;color:#fff">日語工具</span>
      <span class="sub">by 语料库</span>
    </div>
    <button id="settings-btn">⚙ Key</button>
  </header>

  <!-- Tabs -->
  <nav id="tabs">
    <button class="tab active" data-tab="translate">翻訳</button>
    <button class="tab" data-tab="correct">纠错</button>
    <button class="tab" data-tab="script">口播</button>
  </nav>

  <!-- Panels -->
  <main>
    <!-- 翻译 -->
    <div class="panel active" id="panel-translate">
      <div id="no-key-translate" id="no-key">⚠ 请先设置 API Key</div>
      <div class="input-wrap">
        <textarea id="ta-translate" placeholder="输入想表达的中文...&#10;例：我觉得这件事有点难说口"></textarea>
        <button class="run-btn" id="btn-translate">用日语逻辑翻译 →</button>
      </div>
      <div class="output" id="out-translate"></div>
    </div>

    <!-- 纠错 -->
    <div class="panel" id="panel-correct">
      <div class="input-wrap">
        <textarea id="ta-correct" placeholder="输入你想说的日文...&#10;例：私は彼女のことをずっと考えている、でも何も言えない"></textarea>
        <button class="run-btn" id="btn-correct">纠错 + 分析 →</button>
      </div>
      <div class="output" id="out-correct"></div>
    </div>

    <!-- 口播 -->
    <div class="panel" id="panel-script">
      <div class="mode-row" id="script-modes">
        <button class="mode-btn active" data-mode="learn">学套路</button>
        <button class="mode-btn" data-mode="gen">生成脚本</button>
      </div>
      <div class="input-wrap">
        <textarea id="ta-script" placeholder="话题 / 想说的内容...&#10;例：我想聊聊戒掉刷手机之后生活的变化"></textarea>
        <button class="run-btn" id="btn-script">开始 →</button>
      </div>
      <div class="output" id="out-script"></div>
    </div>
  </main>
</div>

<script>
// ── Data ──────────────────────────────────────────────
const COMPONENTS = [{"id": "BUF-01", "type": "启动缓冲", "fragment": "なんか", "trigger": "要说的话有社交风险，需要先减压", "thinking": "「直接说太突兀了，先放一个信号让对方知道接下来不是什么严重的事」", "fn": "全能型启动缓冲。降低后续内容的分量，买思考时间，暗示'别太当真'"}, {"id": "BUF-02", "type": "启动缓冲", "fragment": "あのさ", "trigger": "要开启一个需要对方注意力的话题", "thinking": "「我要说个事，你先听我说」", "fn": "注意力征用器。比なんか更有意图，明确表示'我要说一个有内容的事'"}, {"id": "BUF-03", "type": "启动缓冲", "fragment": "ていうか", "trigger": "要否定或修正前面说的话/对方说的话，但不想正面对撞", "thinking": "「等一下，与其说那个，不如说这个才是重点」", "fn": "轨道修正型缓冲。表面是'话说回来'，实际是'你说的不对/不重要，听我的'"}, {"id": "BUF-04", "type": "启动缓冲", "fragment": "えっと", "trigger": "需要时间组织语言，脑子还没准备好", "thinking": "「等一下，我在想怎么说」", "fn": "纯时间缓冲。没有社交调节功能，只是在拖延。诚实地展示'我还没想好'"}, {"id": "BUF-05", "type": "启动缓冲", "fragment": "いや", "trigger": "内心第一反应是否定/抵抗/不同意", "thinking": "「不对/不是/等等」— 否定冲动的第一声", "fn": "否定型启动。不一定真的在否定内容，有时只是一个'我要说不同看法'的信号枪"}, {"id": "BUF-06", "type": "启动缓冲", "fragment": "あ、", "trigger": "突然想到什么/突然注意到什么", "thinking": "「对了/诶/等一下」— 大脑里有东西刚冒出来", "fn": "意识触发标记。标记一个新的想法刚刚产生，告诉听者'这是即时的'"}, {"id": "BUF-07", "type": "启动缓冲", "fragment": "なんていうか", "trigger": "知道自己要表达什么，但找不到准确的词", "thinking": "「怎么说呢...我知道那个感觉但是词找不到」", "fn": "语言搜索标记。比えっと更有内容——暗示'我有东西要说，只是表达能力跟不上'"}, {"id": "BUF-08", "type": "启动缓冲", "fragment": "正直に言うと", "trigger": "接下来要说的是平时不会说的真话", "thinking": "「我要切换到诚实模式了，做好准备」", "fn": "诚实模式宣告。获取说难听话的许可证。说了这句之后，后面的话即使伤人也有了正当性"}, {"id": "BUF-09", "type": "启动缓冲", "fragment": "まあ", "trigger": "要表达一种'算了/差不多/就那样吧'的态度", "thinking": "「其实有很多可以说的，但我选择压缩成一个模糊的OK」", "fn": "态度压平器。把复杂的内心活动压缩成一个平淡的开头。可以是接受、放弃、妥协、敷衍"}, {"id": "BUF-10", "type": "启动缓冲", "fragment": "ねえ", "trigger": "需要对方的注意力，而且接下来是关于'我们之间'的事", "thinking": "「你听我说，这件事跟你有关/跟我们有关」", "fn": "亲密注意力征用。比あのさ更亲密更紧急。暗示'接下来的话是认真的'"}, {"id": "CMP-01", "type": "力度压缩", "fragment": "ちょっと", "trigger": "判断/感受/请求的力度需要缩小", "thinking": "「直接说100%太猛了，先压到30%」", "fn": "通用力度压缩器。不是真的'一点点'，是社交性地缩小立场。用在负面判断前=软化，用在请求前=客气"}, {"id": "CMP-02", "type": "力度压缩", "fragment": "別に", "trigger": "不想让对方觉得自己在意/介入", "thinking": "「其实挺在意的，但我要装出不在乎的样子」", "fn": "关心度掩盖器。表面说'无所谓'，但后面经常跟着'其实有所谓'的内容。是一种防御姿态"}, {"id": "CMP-03", "type": "力度压缩", "fragment": "そんなに", "trigger": "要否定程度但不否定事实", "thinking": "「不是完全没有，但没你想的那么严重」", "fn": "程度否定器。承认存在但压缩幅度。'不是不喜欢'='有点喜欢'"}, {"id": "CMP-04", "type": "力度压缩", "fragment": "なんとなく", "trigger": "有感觉但没有理由，不想被追问'为什么'", "thinking": "「我说不出具体原因，但就是这么觉得」", "fn": "理由回避器。把判断的基础从'逻辑'切换到'直觉'，阻断对方追问原因的路径"}, {"id": "CMP-05", "type": "力度压缩", "fragment": "一応", "trigger": "做了某事但不想让对方期望太高", "thinking": "「做了是做了，但质量/效果不保证」", "fn": "期望值压低器。在报告行动时降低对方的期待。'做了'→'姑且做了'"}, {"id": "CMP-06", "type": "力度压缩", "fragment": "たぶん", "trigger": "要给判断但不想负100%的责任", "thinking": "「我比较确定，但万一错了我需要一个退路」", "fn": "确信度折扣器。内心可能80%确定，但たぶん把表面确信度压到60%"}, {"id": "PAY-01", "type": "语义载体", "fragment": "違う", "trigger": "感知到不一致/不匹配", "thinking": "「这个和预期/正确/之前的不一样」", "fn": "差异判断。中性偏轻的否定——指出'不同'而不是'错误'"}, {"id": "PAY-02", "type": "语义载体", "fragment": "無理", "trigger": "内心判断'做不到/受不了/不可能'", "thinking": "「超出了我的能力/容忍范围」", "fn": "极限判断。可以是物理性的'做不到'也可以是情绪性的'受不了'。口语中经常被夸张使用"}, {"id": "PAY-03", "type": "语义载体", "fragment": "微妙", "trigger": "评价不是明确的好或坏，在中间偏下的灰色地带", "thinking": "「不好说是好是坏，但如果非要选的话偏向不太行」", "fn": "模糊负面评价。表面上是中立的'微妙'，实际使用中80%是负面的委婉说法"}, {"id": "PAY-04", "type": "语义载体", "fragment": "悪くない", "trigger": "评价是正面的但不想表现得太热情", "thinking": "「其实还不错，但说'好'显得太直接/太投入了」", "fn": "低温正面评价。通过否定负面来表达正面。实际意思范围从'还行'到'相当不错'"}, {"id": "PAY-05", "type": "语义载体", "fragment": "分かんない", "trigger": "无法判断/无法理解/不确定", "thinking": "「信息不够/超出处理能力/真的不知道」", "fn": "判断放弃标记。可以是真的不知道，也可以是不想给答案的逃避"}, {"id": "PAY-06", "type": "语义载体", "fragment": "疲れた", "trigger": "身体或精神资源耗尽", "thinking": "「没力气了」", "fn": "状态报告。可以是物理疲劳也可以是心理疲劳。口语中常用来表示对某件事的厌倦"}, {"id": "PAY-07", "type": "语义载体", "fragment": "寂しい", "trigger": "感知到孤独/缺失/想念", "thinking": "「身边少了什么/少了谁」", "fn": "缺失感表达。在日语口语中很少直接使用，通常被力度压缩和降级包装包裹"}, {"id": "PAY-08", "type": "语义载体", "fragment": "嫌", "trigger": "排斥/不想要/反感", "thinking": "「不要这个」", "fn": "排斥表达。很直接的负面判断。在口语中经常被否定形包装：嫌いじゃない = 其实还行"}, {"id": "PAY-09", "type": "语义载体", "fragment": "忘れてた", "trigger": "突然意识到遗漏了什么", "thinking": "「啊，这件事从记忆里掉出去了」", "fn": "遗漏承认。通常伴随あ作为触发"}, {"id": "PAY-10", "type": "语义载体", "fragment": "面倒くさい", "trigger": "要做的事情消耗的精力超过了它的价值", "thinking": "「可以做但不值得这个effort」", "fn": "成本超限判断。不是'做不到'而是'不想为这个花力气'"}, {"id": "PAY-11", "type": "语义载体", "fragment": "怒ってる", "trigger": "感知到（自己或他人的）愤怒状态", "thinking": "「有攻击性情绪存在」", "fn": "情绪状态标记。用于指出情绪事实。注意：日语中常用否定形来回避直面"}, {"id": "PAY-12", "type": "语义载体", "fragment": "行ってきた", "trigger": "完成了一次外出行为，回来了", "thinking": "「去了某个地方然后回来了，现在要报告」", "fn": "完了行动报告。てきた = 去+做+回。带有'任务完成'的语气"}, {"id": "PAY-13", "type": "语义载体", "fragment": "やってみた", "trigger": "尝试了从未做过的事", "thinking": "「好奇心驱动的实验性行动」", "fn": "实验性行动报告。てみた = 试着做了。暗示'结果未知但我试了'"}, {"id": "PAY-14", "type": "语义载体", "fragment": "高い", "trigger": "价格/成本超出了心理预期", "thinking": "「这个超出了我愿意支付的范围」", "fn": "价格超限判断。口语中几乎永远以问题形式出现：高くない？"}, {"id": "PAY-15", "type": "语义载体", "fragment": "好き", "trigger": "正面感情/偏好", "thinking": "「这个东西让我产生正面感受」", "fn": "偏好表达。直接说好き在口语中其实不多见。更常见的是间接表达：嫌いじゃない/悪くない"}, {"id": "DWN-01", "type": "降级包装", "fragment": "気がする", "trigger": "有判断但不想以事实形式输出", "thinking": "「我比较确定，但包装成'感觉'可以给自己留退路」", "fn": "主观化降级器。把事实陈述降级为个人印象。说话者可能90%确信但表面上变成50%"}, {"id": "DWN-02", "type": "降级包装", "fragment": "かも", "trigger": "要给出判断但预留否定空间", "thinking": "「大概是这样，但如果不是的话我没说过」", "fn": "可能性降级。比気がする更短更随意。经常单独出现在句尾作为全句的确信度折扣"}, {"id": "DWN-03", "type": "降级包装", "fragment": "かな", "trigger": "在自言自语式地思考，或者用疑问来软化判断", "thinking": "「我在想...也许是这样？不确定」", "fn": "思考中标记/软化疑问。可以是真的在想，也可以是用疑问形式来避免断言"}, {"id": "DWN-04", "type": "降级包装", "fragment": "っぽい", "trigger": "基于表面印象的粗略判断", "thinking": "「看起来像是/有那个味道」", "fn": "印象级降级。比気がする更随意更不负责任。'我没认真想，就是这么个感觉'"}, {"id": "DWN-05", "type": "降级包装", "fragment": "感じ", "trigger": "用'感觉/氛围'来替代具体判断", "thinking": "「我说的不是事实，是我接收到的氛围」", "fn": "氛围化降级。把具体判断变成模糊的'感觉/氛围'。比気がする更口语"}, {"id": "DWN-06", "type": "降级包装", "fragment": "なんとも言えない", "trigger": "有判断但选择不输出", "thinking": "「我知道自己的看法，但说出来有风险，所以封印」", "fn": "判断封印器。不是'没有判断'而是'有判断但选择不说'。最高级别的社交回避"}, {"id": "DWN-07", "type": "降级包装", "fragment": "好み分かれる", "trigger": "有负面评价但不想直接说", "thinking": "「我觉得不行，但说'看个人'就不用承担这个判断了」", "fn": "责任转移降级。把个人判断伪装成'客观的分歧现象'。80%情况下说这句话的人本人是负面评价"}, {"id": "DWN-08", "type": "降级包装", "fragment": "人による", "trigger": "不想给出自己的立场", "thinking": "「这个问题有答案但我不想回答，交给'人各有不同'来挡」", "fn": "立场消除器。把评价问题从'你怎么看'变成'每个人不同'。完全不暴露自己"}, {"id": "出口策略-01", "type": "出口策略", "fragment": "んだけど", "trigger": "说完了自己的部分，但不想自己下结论", "thinking": "「我把球传给你了，你来接」", "fn": "未完成连接器+责任转移器。ん=把前文标记为'解释我的状态'，だけど=打开通道不关。真实意图留给听者推断"}, {"id": "出口策略-02", "type": "出口策略", "fragment": "よね", "trigger": "不想独自持有一个判断，需要对方分担", "thinking": "「你也这么觉得吧？告诉我我没错」", "fn": "共识征用器。把个人判断变成共享判断。'我觉得'→'我们觉得'"}, {"id": "出口策略-03", "type": "出口策略", "fragment": "じゃない？", "trigger": "有判断，用反问强化但不直接断言", "thinking": "「明明是这样吧？你不觉得吗？」", "fn": "反问型断言。比よね更有攻击性。形式是问句，实际是在输出判断"}, {"id": "出口策略-04", "type": "出口策略", "fragment": "けど", "trigger": "说完了但暗示还有没说的", "thinking": "「话我说到这里，剩下的你自己想」", "fn": "悬挂连接器。比んだけど更轻。经常单独悬挂在句尾——不连接任何后续内容"}, {"id": "出口策略-05", "type": "出口策略", "fragment": "し", "trigger": "要列举理由/加一个支持论据", "thinking": "「而且还有这个原因」", "fn": "理由追加器。在已有内容后面叠加一个原因。可以是真的补充也可以是事后找理由"}, {"id": "出口策略-06", "type": "出口策略", "fragment": "...（沉默/省略）", "trigger": "说到这里就够了，剩下的不说", "thinking": "「你应该能理解我的意思吧」", "fn": "意味留白。最强的间接表达——什么都不说，让对方自己填充。日语中极其常见"}, {"id": "出口策略-07", "type": "出口策略", "fragment": "知らんけど", "trigger": "说了一个判断之后想撤回责任", "thinking": "「刚才说的跟我没关系，信不信随你」", "fn": "事后免责声明。把刚说的所有内容标记为'不保证'。关西色彩，但全国流行"}, {"id": "出口策略-08", "type": "出口策略", "fragment": "まあいいか", "trigger": "挣扎之后选择放弃追究", "thinking": "「算了，不值得再纠结了」", "fn": "主动放弃结束。不是解决了问题而是决定不再消耗能量在这件事上"}, {"id": "出口策略-09", "type": "出口策略", "fragment": "って", "trigger": "引用自己或他人的想法/话", "thinking": "「我在转述一个想法（可能是我自己的）」", "fn": "引用标记。可以引用别人的话，也可以把自己的想法对象化：'我想'→'有个想法叫做...'"}, {"id": "出口策略-10", "type": "出口策略", "fragment": "でしょ", "trigger": "确信某事并要求对方确认", "thinking": "「这明明是这样的嘛」", "fn": "确信型终结。比よね更强势——不是'你也这样觉得吧？'而是'这不就是这样嘛'"}, {"id": "RDR-01", "type": "轨道切换", "fragment": "あ、やっぱ", "trigger": "刚做了一个选择/说了一句话，立刻想改", "thinking": "「不对不对，刚才那个撤回」", "fn": "实时修正器。在极短时间内取消前一个输出，替换成新的"}, {"id": "RDR-02", "type": "轨道切换", "fragment": "そうじゃなくて", "trigger": "对方理解错了你的意思", "thinking": "「不是那个意思！你听歪了」", "fn": "理解纠正器。否定对方的解读，准备重新表述"}, {"id": "RDR-03", "type": "轨道切换", "fragment": "話変わるんだけど", "trigger": "要切换到完全不相关的话题", "thinking": "「跟现在聊的完全没关系，但我想聊另一个事」", "fn": "话题切换宣告。礼貌地声明'我要跳轨了'"}, {"id": "RDR-04", "type": "轨道切换", "fragment": "忘れて", "trigger": "说了不该说的，要求撤回", "thinking": "「当我没说！请从你的记忆里删除」", "fn": "发言删除请求。当然删不掉——但这个请求本身就是在标记'刚才那句是失言'"}, {"id": "RDR-05", "type": "轨道切换", "fragment": "そもそも", "trigger": "讨论跑偏了，要强行拉回本质问题", "thinking": "「你们在纠结细节，根本问题不在这里」", "fn": "本质回归器。跳过当前讨论层面，直接打到根基"}, {"id": "RDR-06", "type": "轨道切换", "fragment": "いや関係ないんだけど", "trigger": "想说一个偏题的事，先打免责声明", "thinking": "「我知道这不相关，但我就是想说」", "fn": "离题许可生成器。先承认自己要离题来降低听者的期待管理成本"}, {"id": "RCT-01", "type": "即时反应", "fragment": "えー", "trigger": "接收到意外信息", "thinking": "「这跟我预期的不一样」", "fn": "意外信号。音长决定情绪：短え=轻微意外，长えー=强烈意外"}, {"id": "RCT-02", "type": "即时反应", "fragment": "うわ", "trigger": "接收到冲击性信息/看到冲击性场景", "thinking": "「冲击力太大了来不及处理」", "fn": "冲击标记。比えー更原始更无法控制"}, {"id": "RCT-03", "type": "即时反应", "fragment": "やばい", "trigger": "某事超出了正常范围（好或坏）", "thinking": "「这个程度不正常」", "fn": "超限标记。纯口语。可以是正面（やばいおいしい）也可以是负面（やばい遅刻する）。由上下文决定极性"}, {"id": "RCT-04", "type": "即时反应", "fragment": "あー", "trigger": "理解了/接受了/想起来了", "thinking": "「哦原来如此/啊对了」", "fn": "理解到达标记。标记大脑中有什么东西'连上了'"}, {"id": "RCT-05", "type": "即时反应", "fragment": "うーん", "trigger": "需要思考/在犹豫/不确定", "thinking": "「让我想想...」", "fn": "处理中标记。告诉对方'我在认真考虑你的问题但还没有答案'"}, {"id": "SOC-01", "type": "社交校准", "fragment": "〜でもらえると助かるんだけど", "trigger": "需要对方做某事但不想用命令形式", "thinking": "「我需要你帮忙，但我不能命令你」", "fn": "请求伪装器。把命令变成'如果你能...那我就得救了'。最高级别的间接请求"}, {"id": "SOC-02", "type": "社交校准", "fragment": "私だけ？", "trigger": "有一个感受但不确定是不是只有自己这么觉得", "thinking": "「是我奇怪吗？还是大家都这样？」", "fn": "孤立感确认。寻找同伴来减轻'只有我这样'的不安"}, {"id": "SOC-03", "type": "社交校准", "fragment": "怒んないでね", "trigger": "接下来要说的话可能让对方不高兴", "thinking": "「我要说了，但你先答应不生气」", "fn": "情绪预保险。在输出风险内容前锁定对方的情绪承诺"}, {"id": "SOC-04", "type": "社交校准", "fragment": "ごめん、今いい？", "trigger": "需要占用对方的时间/注意力", "thinking": "「我知道你可能在忙，但我需要你」", "fn": "注意力使用许可申请。先道歉再请求，给对方一个拒绝的窗口（虽然大多数人不会用）"}, {"id": "SOC-05", "type": "社交校准", "fragment": "嫌って言っていいよ？", "trigger": "要提出请求但想给对方真实的拒绝权", "thinking": "「我有事想拜托你，但我不想给你压力」", "fn": "压力释放阀。在请求前告诉对方'拒绝是安全的'——虽然这本身也形成了一种微妙的压力"}, {"id": "SOC-06", "type": "社交校准", "fragment": "どう思う？", "trigger": "输出了自己的判断后想确认是否合理", "thinking": "「我说了我的看法了，你觉得呢？」", "fn": "判断外包。可以是真的想听意见，也可以是想让对方帮自己做决定"}, {"id": "SOC-07", "type": "社交校准", "fragment": "聞いて聞いて", "trigger": "有一个兴奋/重要的事情要分享", "thinking": "「我现在很想说这件事！注意力给我！」", "fn": "兴奋型注意力征用。比ねえ更强更急迫。暗示'接下来是个故事'"}, {"id": "SOC-08", "type": "社交校准", "fragment": "ごめんね、私ばっかり喋って", "trigger": "意识到自己占据了太多话语空间", "thinking": "「对方都没机会说话了，我太自我中心了」", "fn": "话语空间归还。社交性地退让，给对方插入的机会"}, {"id": "SOC-09", "type": "社交校准", "fragment": "言い方悪いかもだけど", "trigger": "接下来的表达方式可能不好听", "thinking": "「内容我要说，但表达方式我没有信心」", "fn": "措辞免责声明。跟'正直に言うと'不同——那个是'内容可能伤人'，这个是'措辞可能伤人'"}, {"id": "SOC-10", "type": "社交校准", "fragment": "そういうとこだよ", "trigger": "对方又犯了同样的毛病", "thinking": "「你的问题就出在这里——就是这种行为」", "fn": "行为模式指摘。不说具体错在哪，而是指向一个'你一直以来的模式'"}, {"id": "META-01", "type": "轨道切换", "fragment": "なんか変なこと言ってる？私", "trigger": "说到一半开始怀疑自己", "thinking": "「等一下，我说的是不是很奇怪」", "fn": "自我监听回路。跳出说话状态，从外部视角审视自己的输出"}, {"id": "META-02", "type": "轨道切换", "fragment": "いや、今のなしで", "trigger": "说完立刻后悔", "thinking": "「那句话不应该出来的，请当作不存在」", "fn": "即时撤回。承认刚才的输出是错误的并请求作废"}, {"id": "META-03", "type": "轨道切换", "fragment": "あれ、なんの話してたっけ", "trigger": "话题偏离太远，原始主线丢失", "thinking": "「等一下...我们最开始在聊什么？」", "fn": "话题主线搜索。中断当前流程回去找原来的入口"}, {"id": "COMBO-01", "type": "启动缓冲+力度压缩", "fragment": "なんかちょっと", "trigger": "要说负面的事，需要双重缓冲", "thinking": "「直接说太猛了，先减压再压缩」", "fn": "双层软化。日语口语中最常见的前置组合。几乎可以放在任何负面判断前面"}, {"id": "COMBO-02", "type": "语义载体+降级包装", "fragment": "〜気がする", "trigger": "判断+不想断言，组合使用", "thinking": "「[判断]是我的结论，但我用'感觉'来包装它」", "fn": "判断即降级。语义载体和降级包装的一体化结构"}, {"id": "COMBO-03", "type": "出口策略+出口策略", "fragment": "んだけど...どう思う？", "trigge // ── Claude API ────────────────────────────────────────
async function callClaude(systemText, userText, onChunk, maxTokens = 1500) {
  const key = getKey();
  if(!key) { alert('请先设置 API Key（右上角 ⚙）'); return null; }

  const compText = COMPONENTS.map(c =>
    `[${c.id}] ${c.fragment} — ${c.trigger} → ${c.fn}`
  ).join('\n');

  const exText = EXAMPLES.slice(0,30).map(e => `JP: ${e.jp}\nZH: ${e.zh}`).join('\n---\n');

  const fullSystem = systemText
    .replace('{{COMPONENTS}}', compText)
    .replace('{{EXAMPLES}}', exText);

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: [{ type: 'text', text: fullSystem, cache_control: { type: 'ephemeral' } }],
      messages: [{ role: 'user', content: userText }],
      stream: true
    })
  });

  if(!resp.ok) {
    const err = await resp.json();
    const msg = err.error?.message || resp.statusText;
    if(resp.status === 401) throw new Error('API Key 无效或已过期，请点右上角 ⚙ 重新填入');
    if(resp.status === 429) throw new Error('请求过于频繁，请稍等片刻再试');
    if(resp.status === 529 || resp.status === 500) throw new Error('Anthropic 服务暂时不可用，请稍后重试');
    throw new Error(msg);
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '', full = '';

  while(true) {
    const { done, value } = await reader.read();
    if(done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for(const line of lines) {
      if(!line.startsWith('data: ')) continue;
      const raw = line.slice(6);
      if(raw === '[DONE]') continue;
      try {
        const ev = JSON.parse(raw);
        if(ev.type === 'content_block_delta' && ev.delta?.text) {
          full += ev.delta.text;
          if(onChunk) onChunk(full);
        }
      } catch{}
    }
  }
  return full;
}

function loading(el) {
  el.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>生成中...</span></div>';
}

function parseJSON(text) {
  const m = text.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('no JSON');
  return JSON.parse(m[0]);
}

function parseGenRaw(text) {
  // 解析 [HOOK]/[MAIN]/[CLOSE]/[META] 分段格式
  const sections = {};
  const re = /\[(HOOK|MAIN|CLOSE|META)\]\s*([\s\S]*?)(?=\n\[(?:HOOK|MAIN|CLOSE|META)\]|$)/g;
  let m;
  while((m = re.exec(text)) !== null) {
    sections[m[1]] = m[2].trim();
  }
  let meta = {};
  if(sections.META) {
    try { meta = JSON.parse(sections.META); } catch{}
  }
  return {
    hook: sections.HOOK || '',
    main: sections.MAIN || '',
    close: sections.CLOSE || '',
    hook_type: meta.hook_type || '',
    key_phrases: meta.key_phrases || [],
    duration: meta.duration || '',
  };
}

    const sections = [];
    if(data.corrected) sections.push({ label:'修正版', text: data.corrected });
    if(data.native)    sections.push({ label:'日本人的说法', text: data.native });
    el.querySelector('#cr-native').appendChild(pdfBtn(sections, '纠错'));
  }
}

function renderLearn(el, data) {
  let html = `<div class="result-card"><div class="card-label">开场钩子选项</div>`;
  data.hooks?.forEach(h => {
    html += `<div class="hook-card">
      <div class="hook-type">${esc(h.type)}</div>
      <div class="hook-example">${esc(h.example)}</div>
      <div class="hook-why">${esc(h.why)}</div>
    </div>`;
  });
  html += `</div>`;

  if(data.structure) html += `
    <div class="result-card">
      <div class="card-label">内容结构建议</div>
      <div style="font-size:14px;line-height:1.7">${esc(data.structure)}</div>
    </div>`;

  if(data.transitions?.length) html += `
    <div class="result-card">
      <div class="card-label">转场句</div>
      <div class="phrase-list">${data.transitions.map(t => `<span class="phrase">${esc(t)}</span>`).join('')}</div>
    </div>`;

  if(data.closings?.length) html += `
    <div class="result-card">
      <div class="card-label">收尾选项</div>
      ${data.closings.map(c => `<div class="hook-card" style="border-left-color:var(--green)">
        <div class="hook-type" style="color:var(--green)">${esc(c.type)}</div>
        <div class="hook-example">${esc(c.example)}</div>
      </div>`).join('')}
    </div>`;

  el.innerHTML = html;
}

function renderGen(el, data) {
  if(!data.hook && !data.main && !data.close) {
    el.innerHTML = '<div class="result-card">生成失败，请重试</div>'; return;
  }

  const sections = [
    { label:'开场', text: data.hook },
    { label:'主体', text: data.main },
    { label:'收尾', text: data.close },
  ];

  let html = '<div class="result-card" id="gen-script-card">';
  sections.forEach(s => {
    if(!s.text) return;
    html += `<div class="script-block">
      <div class="script-label">${s.label}</div>
      <div class="script-text">${esc(s.text)}</div>
    </div>`;
  });
  html += '<div id="gen-tts-row"></div></div>';

  if(data.key_phrases?.length) html += `
    <div class="result-card">
      <div class="card-label">亮点表达</div>
      <div class="phrase-list">${data.key_phrases.map(p => `<span class="phrase">${esc(p)}</span>`).join('')}</div>
    </div>`;

  if(data.duration) html += `
    <div class="result-card" style="padding:10px 16px">
      <span style="font-size:12px;color:var(--dim)">预计时长 </span>
      <span style="font-size:13px;color:var(--gold)">${esc(data.duration)}</span>
      ${data.hook_type ? `<span style="font-size:12px;color:var(--dim);margin-left:12px">钩子类型 </span><span style="font-size:13px;color:var(--gold)">${esc(data.hook_type)}</span>` : ''}
    </div>`;

  el.innerHTML = html;
  const fullText = [data.hook, data.main, data.close].filter(Boolean).join('\n\n');
  const ttsRow = el.querySelector('#gen-tts-row');
  ttsRow.appendChild(ttsBtn(fullText));
  const scriptSections = [
    { label:'开场', text: data.hook },
    { label:'主体', text: data.main },
    { label:'収尾', text: data.close },
  ].filter(s => s.text);
  ttsRow.appendChild(pdfBtn(scriptSections, '口播脚本'));
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function errCard(el, msg) {
  el.innerHTML = `<div class="result-card" style="border-color:var(--accent)">
    <div class="card-label" style="color:var(--accent)">错误</div>
    <div style="font-size:13px;color:var(--mid)">${esc(msg)}</div>
  </div>`;
}

// ── Handlers ──────────────────────────────────────────
async function runTranslate() {
  const input = document.getElementById('ta-translate').value.trim();
  if(!input) return;
  const el = document.getElementById('out-translate');
  const btn = document.getElementById('btn-translate');
  loading(el); btn.disabled = true;
  try {
    const raw = await callClaude(SYS_TRANSLATE, input, null);
    if(!raw) { btn.disabled = false; return; }
    renderTranslate(el, parseJSON(raw));
  } catch(e) { errCard(el, e.message); }
  btn.disabled = false;
}

async function runCorrect() {
  const input = document.getElementById('ta-correct').value.trim();
  if(!input) return;
  const el = document.getElementById('out-correct');
  const btn = document.getElementById('btn-correct');
  loading(el); btn.disabled = true;
  try {
    const raw = await callClaude(SYS_CORRECT, input, null);
    if(!raw) { btn.disabled = false; return; }
    renderCorrect(el, parseJSON(raw));
  } catch(e) { errCard(el, e.message); }
  btn.disabled = false;
}

async function runScript() {
  const input = document.getElementById('ta-script').value.trim();
  if(!input) return;
  const el = document.getElementById('out-script');
  const btn = document.getElementById('btn-script');
  loading(el); btn.disabled = true;
  try {
    if(scriptMode === 'learn') {
      const raw = await callClaude(SYS_LEARN, input, null, 1500);
      if(!raw) { btn.disabled = false; return; }
      renderLearn(el, parseJSON(raw));
    } else {
      const raw = await callClaude(SYS_GEN, input, null, 3000);
      if(!raw) { btn.disabled = false; return; }
      renderGen(el, parseGenRaw(raw));
    }
  } catch(e) { errCard(el, e.message); }
  btn.disabled = false;
}

document.getElementById('btn-translate').onclick = runTranslate;
document.getElementById('btn-correct').onclick = runCorrect;
document.getElementById('btn-script').onclick = runScript;

// Enter key in textareas (Cmd/Ctrl+Enter)
['ta-translate','ta-correct','ta-script'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      if(id === 'ta-translate') runTranslate();
      else if(id === 'ta-correct') runCorrect();
      else runScript();
    }
  });
});

// ── TTS (Web Speech API — 免费，无需 API Key) ─────────
let _jaVoice = null;
let _activeBtn = null;
let _chromeKeepAlive = null;

function getJaVoice() {
  if(_jaVoice) return _jaVoice;
  const voices = window.speechSynthesis.getVoices();
  _jaVoice = voices.find(v => v.lang === 'ja-JP')
          || voices.find(v => v.lang.startsWith('ja'))
          || null;
  return _jaVoice;
}
window.speechSynthesis.onvoiceschanged = () => { _jaVoice = null; };

function stopTTS() {
  clearInterval(_chromeKeepAlive);
  _chromeKeepAlive = null;
  window.speechSynthesis.cancel();
  if(_activeBtn) {
    _activeBtn.classList.remove('playing');
    _activeBtn.textContent = '▶ 朗読';
    _activeBtn = null;
  }
}

function playTTS(text, btn) {
  // 点的是正在播放的按钮 → 停止
  if(_activeBtn === btn) { stopTTS(); return; }
  // 有其他在播放 → 先停
  if(_activeBtn) stopTTS();

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.88;
  utt.pitch = 1;
  const voice = getJaVoice();
  if(voice) utt.voice = voice;

  _activeBtn = btn;
  btn.classList.add('playing');
  btn.textContent = '■ 停止';

  utt.onend = utt.onerror = () => stopTTS();

  // Chrome bug：长文本约15秒后静默停止，用 pause/resume 保活
  _chromeKeepAlive = setInterval(() => {
    if(!window.speechSynthesis.speaking) { stopTTS(); return; }
    window.speechSynthesis.pause();
    window.speechSynthesis.resume();
  }, 10000);

  window.speechSynthesis.speak(utt);
}

function ttsBtn(text) {
  const btn = document.createElement('button');
  btn.className = 'tts-btn';
  btn.textContent = '▶ 朗読';
  btn.onclick = () => playTTS(text, btn);
  return btn;
}

// ── Kuroshiro (furigana) ──────────────────────────────
let _kuroshiro = null;
let _kuroshiroLoading = false;
let _kuroshiroCallbacks = [];

async function getKuroshiro() {
  if(_kuroshiro) return _kuroshiro;
  if(_kuroshiroLoading) {
    return new Promise(res => _kuroshiroCallbacks.push(res));
  }
  _kuroshiroLoading = true;
  const k = new Kuroshiro();
  await k.init(new KuromojiAnalyzer({
    dictPath: 'https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict'
  }));
  _kuroshiro = k;
  _kuroshiroCallbacks.forEach(cb => cb(k));
  _kuroshiroCallbacks = [];
  return k;
}

async function toFuriganaHtml(text) {
  const k = await getKuroshiro();
  return await k.convert(text, { mode: 'furigana', to: 'hiragana' });
}

const SECTION_COLORS = {
  '开场':'#e87461','主体':'#5ea8d4','收尾':'#4ecfd4',
  '翻訳結果':'#5ebf7b','修正版':'#5ea8d4','日本人的说法':'#9a7ae0',
};

function buildPrintHtml(sectionsHtml, title) {
  return `<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;
  background:#faf9f7;color:#1a1a1a;padding:32px 28px 80px;font-size:14px;line-height:2.4}
h1{font-size:18px;font-weight:700;margin-bottom:4px}
.meta{font-size:12px;color:#888;margin-bottom:28px;padding-bottom:12px;border-bottom:1px solid #ddd}
.section{margin-bottom:22px}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:3px 0 3px 10px;border-left:3px solid;margin-bottom:10px}
.section-body{font-size:15px}

  box-shadow:0 4px 12px rgba(0,0,0,.2)}
@media print{.print-btn{display:none}}

${sectionsHtml}
<button class="print-btn" onclick="window.print()">打印 / 保存 PDF</button>
</body></html>`;
}

async function exportPDF(sections, title, btn) {
  btn.disabled = true;
  btn.textContent = '⏳ 处理中...';

  // 必须在 await 之前同步开窗，否则移动端拦截弹窗
  const win = window.open('', '_blank');
  if(!win) {
    // 开窗被拦截时降级：在页内显示 overlay
    exportPDFOverlay(sections, title, btn);
    return;
  }

  win.document.write(buildPrintHtml('<div class="loading">注音处理中，请稍候…</div>', title));
  win.document.close();

  try {
    const processed = await Promise.all(
      sections.map(async s => ({
        label: s.label,
        html: await toFuriganaHtml(s.text),
      }))
    );
    const sectionsHtml = processed.map(s => {
      const color = SECTION_COLORS[s.label] || '#888';
      return `<div class="section">
        <div class="section-label" style="color:${color};border-left-color:${color}">${s.label}</div>
        <div class="section-body">${s.html}</div>
      </div>`;
    }).join('');
    win.document.open();
    win.document.write(buildPrintHtml(sectionsHtml, title));
    win.document.close();
  } catch(e) {
    win.document.body.innerHTML = '<p style="padding:20px;color:red">处理失败: ' + e.message + '</p>';
  }
  btn.disabled = false;
  btn.textContent = '📄 导出 PDF';
}

// 降级方案：页内全屏 overlay（弹窗被拦截时使用）
async function exportPDFOverlay(sections, title, btn) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#faf9f7;z-index:999;overflow-y:auto;padding:28px 20px 80px;font-family:Hiragino Sans,sans-serif;font-size:14px;line-height:2.4;color:#1a1a1a';
  overlay.innerHTML = '<p style="color:#888;text-align:center;padding:40px">注音处理中…</p>';

  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ 关闭';
  closeBtn.style.cssText = 'position:fixed;top:16px;right:16px;padding:8px 16px;background:#333;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;z-index:1000';
  closeBtn.onclick = () => { overlay.remove(); closeBtn.remove(); printBtn.remove(); };

  const printBtn = document.createElement('button');
  printBtn.textContent = '打印 / 保存 PDF';
  printBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:12px 22px;background:#e87461;color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;z-index:1000';
  printBtn.onclick = () => window.print();

  document.body.appendChild(overlay);
  document.body.appendChild(closeBtn);
  document.body.appendChild(printBtn);

  try {
    const processed = await Promise.all(
      sections.map(async s => ({
        label: s.label,
        html: await toFuriganaHtml(s.text),
      }))
    );
    overlay.innerHTML = '<h2 style="font-size:18px;font-weight:700;margin-bottom:20px">' + title + '</h2>' +
      processed.map(s => {
        const color = SECTION_COLORS[s.label] || '#888';
        return `<div style="margin-bottom:22px">
          <div style="font-size:10px;letter-spacing:2px;color:${color};border-left:3px solid ${color};padding-left:10px;margin-bottom:10px">${s.label}</div>
          <div>${s.html}</div></div>`;
      }).join('');
  } catch(e) {
    overlay.innerHTML = '<p style="color:red;padding:20px">处理失败: ' + e.message + '</p>';
  }
  btn.disabled = false;
  btn.textContent = '📄 导出 PDF';
}

function pdfBtn(sections, title) {
  const btn = document.createElement('button');
  btn.className = 'pdf-btn';
  btn.textContent = '📄 导出 PDF';
  btn.onclick = () => exportPDF(sections, title, btn);
  return btn;
}
